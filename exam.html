<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTVTED Pre-Board – Exam in Progress</title>
  <link rel="stylesheet" href="style.css?v=3">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="page-wrapper">

  <!-- Top Navigation (Sticky) -->
  <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: var(--surface); border-bottom: 1px solid var(--border);">
    <div class="brand">
      <div style="font-size: 24px; font-weight: bold; color: var(--primary);" id="display-subject-name">🎓 BTVTED Exam</div>
      <div style="font-size: 14px; color: var(--text-muted);">Practice Assessment</div>
    </div>
    
    <div class="timer-display" id="timer-box" style="display: flex; align-items: center; gap: 10px; background: var(--secondary); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);">
      <div class="timer-icon">⏱</div>
      <div id="timer" style="color: var(--complementary); margin: 0;">60:00</div>
    </div>
  </nav>

  <div class="exam-wrapper">
    <!-- Progress Indicator -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>

    <div class="exam-header-bar">
      <div class="exam-subject-info">
        <h2 id="current-subject-title">&nbsp;</h2>
        <span>Instructions: Select the best answer for each question.</span>
      </div>
      <div class="answered-count">
        Progress: <strong id="answered-num">0</strong> / <strong id="total-num">30</strong>
      </div>
    </div>

    <!-- Questions Container -->
    <div id="questions-container">
      <!-- Questions will be injected here by JS -->
    </div>

    <div class="exam-actions" style="margin-top: 32px; display: flex; justify-content: flex-end;">
      <button class="btn-primary" id="submitExamBtn" style="display: flex; align-items: center; gap: 8px; font-size: 1.1rem; padding: 16px 32px;">
        <span>Finish and Submit Exam</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </button>
    </div>
  </div>

  <!-- Result Modal -->
  <div class="modal-overlay" id="resultModal">
    <div class="result-modal">
      <div class="result-icon" id="resultIcon">🏆</div>
      <h2 id="resultTitle">Performance Summary</h2>
      
      <div class="score-display" id="finalScore">0 / 30</div>
      <div class="score-label">Final Exam Score</div>

      <div class="result-breakdown">
        <div class="breakdown-item total">
          <div class="val" id="res-total">30</div>
          <div class="lbl">Items</div>
        </div>
        <div class="breakdown-item correct">
          <div class="val" id="res-correct">0</div>
          <div class="lbl">Correct</div>
        </div>
        <div class="breakdown-item wrong">
          <div class="val" id="res-wrong">0</div>
          <div class="lbl">Wrong</div>
        </div>
      </div>

      <div style="display: flex; gap: 12px; justify-content: center;">
        <button class="btn-retry" onclick="location.reload()">Retry Exam</button>
        <button class="btn-back" onclick="window.location.href='dashboard.html'">Dashboard</button>
      </div>
    </div>
  </div>

  <script src="exam.js"></script>
</body>
</html>
